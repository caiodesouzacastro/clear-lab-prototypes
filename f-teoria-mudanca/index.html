<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Auxiliar de Teoria de Mudança — CLEAR Lab (piloto)</title>
<meta name="description" content="Oferece elementos para o gestor construir sua teoria de mudança. Piloto interno CLEAR Lab." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root{ color-scheme: light; }
  html,body{ margin:0; padding:0; background:#F7F5EF; }
  *{ box-sizing:border-box; }
  .ebr-mono{font-family:'JetBrains Mono',monospace;letter-spacing:.14em;text-transform:uppercase;}
  .ebr-serif{font-family:'Fraunces',serif;}
  .ebr-btn{transition:transform .15s ease,opacity .15s ease;cursor:pointer;}
  .ebr-btn:hover{opacity:.92;transform:translateY(-1px);}
  .ebr-chip{transition:border-color .15s ease,color .15s ease;cursor:pointer;}
  .ebr-chip:hover{border-color:#08B0EE;color:#01354A;}
  @keyframes ebrpulse{0%,100%{opacity:.35}50%{opacity:1}}
  .ebr-dot{animation:ebrpulse 1.2s ease-in-out infinite;}
  @keyframes ebrup{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .ebr-rise{animation:ebrup .5s ease both;}
  a{ color:#01354A; }
  textarea{ font-family:'DM Sans',sans-serif; }
  .ebr-fontes a:hover{ color:#01354A; text-decoration:underline; }
  @media print {
    .no-print{ display:none !important; }
    html,body{ background:#fff !important; }
    header{ padding:16px 0 !important; }
    main{ padding:12px 0 0 !important; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;
const WORKER_URL = "https://evidencia-br.caiodesouzacastro28.workers.dev";
const PRODUTO = "teoria";

function parseJSON(text){
  let t = (text||"").replace(/```json|```/g, "").trim();
  const s = t.indexOf("{"), e = t.lastIndexOf("}");
  if (s !== -1 && e !== -1) t = t.slice(s, e+1);
  return JSON.parse(t);
}
async function ask(question){
  const r = await fetch(WORKER_URL, { method:"POST", headers:{ "Content-Type":"application/json" }, body: JSON.stringify({ produto: PRODUTO, question }) });
  const json = await r.json();
  if (json.error) throw new Error(json.error.message || "Erro na API");
  const cand = json.candidates && json.candidates[0];
  const txt = (cand?.content?.parts || []).map(p=>p.text).filter(Boolean).join("");
  const parsed = parseJSON(txt);
  const chunks = cand?.groundingMetadata?.groundingChunks || [];
  const grounded = chunks.map(c=>({ titulo:c.web?.title||c.web?.uri, url:c.web?.uri })).filter(x=>x.url);
  if (grounded.length && (!parsed.fontes || !parsed.fontes.length)) parsed.fontes = grounded;
  return parsed;
}

const C = { navy:"#01354A", navy2:"#012030", blue:"#08B0EE", green:"#98C43B", paper:"#F7F5EF", ink:"#1A1A1C", amber:"#E0992E", rust:"#C2572E" };
const NIVEL = {
  A:{cor:C.green,rotulo:"Forte",desc:"Revisões sistemáticas / múltiplos ECRs"},
  B:{cor:C.blue,rotulo:"Moderada",desc:"Estudo controlado ou quase-experimental"},
  C:{cor:C.amber,rotulo:"Limitada",desc:"Estudos observacionais / séries de casos"},
  D:{cor:C.rust,rotulo:"Incipiente",desc:"Opinião de especialista / sem evidência robusta"},
};
const INTENS = { "Baixo":C.green, "Médio":C.amber, "Medio":C.amber, "Alto":C.rust };
const EXEMPLOS = ["Programa de busca ativa contra a evasão escolar", "Transferência de renda para reduzir trabalho infantil", "Telemedicina para reduzir filas na atenção primária", "Mentoria para reduzir reincidência juvenil"];

function Selo({texto, cor, escuro}){
  return <span style={{ background:cor, color:escuro?C.navy2:"#fff", borderRadius:999, padding:"3px 12px", fontSize:11.5, fontWeight:700, whiteSpace:"nowrap" }}>{texto}</span>;
}
function NivelSelo({nivel}){
  const n = NIVEL[nivel] || NIVEL.D;
  return <span title={n.desc}><Selo texto={"Nível "+nivel+" · "+n.rotulo} cor={n.cor} escuro={nivel==="A"||nivel==="C"} /></span>;
}
function Fontes({fontes}){
  if(!fontes || !fontes.length) return null;
  return (
    <div className="ebr-fontes" style={{ marginTop:24 }}>
      <div className="ebr-mono" style={{ fontSize:9.5, color:"#a8a292", marginBottom:7 }}>Fontes consultadas</div>
      <div style={{ display:"flex", flexDirection:"column", gap:3 }}>
        {fontes.map((f,i)=>(<a key={i} href={f.url} target="_blank" rel="noreferrer" style={{ fontSize:11.5, color:"#8a8576", textDecoration:"none", lineHeight:1.45 }}>· {f.titulo} ↗</a>))}
      </div>
    </div>
  );
}
function NavyBox({rotulo, children}){
  return (
    <div style={{ marginTop:24, background:C.navy, color:"#fff", borderRadius:13, padding:"18px 20px" }}>
      <div className="ebr-mono" style={{ fontSize:10.5, color:C.green, marginBottom:8 }}>{rotulo}</div>
      <div style={{ fontSize:14.5, lineHeight:1.6, color:"rgba(255,255,255,.88)" }}>{children}</div>
    </div>
  );
}


function Elo({rotulo, itens, cor}){
  return (
    <div style={{ background:"#fff", border:"1px solid #e4ded2", borderLeft:`5px solid ${cor}`, borderRadius:11, padding:"13px 16px" }}>
      <div className="ebr-mono" style={{ fontSize:10, color:cor, marginBottom:7 }}>{rotulo}</div>
      <ul style={{ margin:0, paddingLeft:18, fontSize:14.5, lineHeight:1.5 }}>{(itens||[]).map((t,i)=><li key={i} style={{ marginBottom:4 }}>{t}</li>)}</ul>
    </div>
  );
}
function Seta(){ return <div style={{ textAlign:"center", color:"#bdb7a8", fontSize:18, lineHeight:1, margin:"2px 0" }}>↓</div>; }
function renderResult(res){
  const c = res.cadeia || {};
  return (<div>
    <div className="ebr-mono" style={{ fontSize:10.5, color:C.blue, marginBottom:8 }}>O problema</div>
    <p className="ebr-serif" style={{ fontSize:22, lineHeight:1.35, margin:"0 0 24px", fontWeight:500 }}>{res.problema}</p>
    {res.causas && res.causas.length>0 && (
      <div style={{ background:"#fff", border:"1px solid #e4ded2", borderLeft:`5px solid ${C.rust}`, borderRadius:11, padding:"14px 16px", marginBottom:22 }}>
        <div className="ebr-mono" style={{ fontSize:10, color:C.rust, marginBottom:8 }}>Diagnóstico · causas prováveis</div>
        <ul style={{ margin:0, paddingLeft:18, fontSize:14.5, lineHeight:1.5 }}>{res.causas.map((t,i)=><li key={i} style={{ marginBottom:5 }}>{t}</li>)}</ul>
      </div>
    )}
    <div className="ebr-mono" style={{ fontSize:10.5, color:C.navy, opacity:.65, marginBottom:4 }}>Cadeia da teoria de mudança</div>
    <div style={{ fontSize:12.5, color:"#8a8576", marginBottom:14 }}>Elementos para você montar a sua — insumos → atividades → produtos → resultados → impacto.</div>
    <Elo rotulo="Insumos" itens={c.insumos} cor={C.navy} /><Seta/>
    <Elo rotulo="Atividades" itens={c.atividades} cor={C.amber} /><Seta/>
    <Elo rotulo="Produtos" itens={c.produtos} cor={C.blue} /><Seta/>
    <Elo rotulo="Resultados" itens={c.resultados} cor={C.green} /><Seta/>
    <div style={{ background:C.navy, color:"#fff", borderRadius:11, padding:"15px 18px" }}>
      <div className="ebr-mono" style={{ fontSize:10, color:C.green, marginBottom:6 }}>Impacto de longo prazo</div>
      <div style={{ fontSize:16, lineHeight:1.45 }}>{c.impacto}</div>
    </div>
    <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14, marginTop:18 }}>
      <div style={{ background:"#fff", border:"1px solid #e4ded2", borderRadius:11, padding:"14px 16px" }}>
        <div className="ebr-mono" style={{ fontSize:10, color:C.blue, marginBottom:8 }}>Premissas críticas</div>
        <ul style={{ margin:0, paddingLeft:18, fontSize:13.5, lineHeight:1.5 }}>{(res.premissas||[]).map((t,i)=><li key={i} style={{ marginBottom:5 }}>{t}</li>)}</ul>
      </div>
      <div style={{ background:"#fbeae4", border:`1px solid ${C.rust}`, borderRadius:11, padding:"14px 16px" }}>
        <div className="ebr-mono" style={{ fontSize:10, color:C.rust, marginBottom:8 }}>Riscos</div>
        <ul style={{ margin:0, paddingLeft:18, fontSize:13.5, lineHeight:1.5 }}>{(res.riscos||[]).map((t,i)=><li key={i} style={{ marginBottom:5 }}>{t}</li>)}</ul>
      </div>
    </div>
    {res.avaliacao && <NavyBox rotulo="Desenho avaliativo sugerido"><strong style={{ color:"#fff" }}>{res.avaliacao.desenho}.</strong> {res.avaliacao.justificativa}</NavyBox>}
    <Fontes fontes={res.fontes} />
    <p style={{ marginTop:24, fontSize:12, color:"#8a8576", lineHeight:1.55 }}>Estes são <strong>elementos para construção</strong>, não uma teoria de mudança pronta. Use como ponto de partida para a equipe montar e validar a sua.</p>
  </div>);
}


function App(){
  const [q, setQ] = useState("");
  const [loading, setLoading] = useState(false);
  const [res, setRes] = useState(null);
  const [err, setErr] = useState(null);
  async function run(p){
    const texto = (p ?? q).trim();
    if(!texto || loading) return;
    setQ(texto); setLoading(true); setErr(null); setRes(null);
    try{ setRes(await ask(texto)); }
    catch(e){ setErr("Não consegui processar. Verifique o Worker/limite do Gemini ou reformule. (" + (e.message||"") + ")"); }
    finally{ setLoading(false); }
  }
  return (
    <div style={{ fontFamily:"'DM Sans',sans-serif", color:C.ink, background:C.paper, minHeight:"100vh" }}>
      <header style={{ background:C.navy, color:"#fff", padding:"30px 28px 34px", position:"relative", overflow:"hidden" }}>
        <div className="no-print" style={{ position:"absolute", top:-120, right:-80, width:320, height:320, borderRadius:"50%", background:C.blue, opacity:.08 }} />
        <div className="no-print" style={{ position:"absolute", bottom:-140, left:-60, width:260, height:260, borderRadius:"50%", background:C.green, opacity:.07 }} />
        <div style={{ maxWidth:920, margin:"0 auto", position:"relative" }}>
          <a href="../" className="no-print ebr-mono" style={{ fontSize:10, color:C.blue, textDecoration:"none", display:"inline-block", marginBottom:12 }}>← Portal dos protótipos</a>
          <div className="ebr-mono" style={{ fontSize:11, color:C.blue, marginBottom:14 }}>CLEAR Lab · Protótipo F · Camada 03 — Propor · PILOTO</div>
          <h1 className="ebr-serif" style={{ fontSize:44, lineHeight:1.05, margin:0, fontWeight:600 }}>Auxiliar de <span style={{ fontStyle:"italic", color:C.blue }}>Teoria de Mudança</span></h1>
          <p style={{ maxWidth:580, marginTop:14, color:"rgba(255,255,255,.78)", fontSize:15.5, lineHeight:1.55 }}>Descreva o problema ou a ideia de programa. O sistema levanta as causas prováveis e sugere os elementos da cadeia — insumos, atividades, produtos, resultados, impacto — com premissas, riscos e desenho avaliativo. São elementos para você construir a sua ToC, não uma versão pronta.</p>
        </div>
      </header>
      <main style={{ maxWidth:920, margin:"0 auto", padding:"28px 28px 64px" }}>
        
        <div className="no-print" style={{ background:"#fff", border:"1px solid #e4ded2", borderRadius:14, padding:18 }}>
          <label className="ebr-mono" style={{ fontSize:10.5, color:C.navy, opacity:.7 }}>Problema ou ideia de programa</label>
          <textarea value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>{ if(e.key==="Enter" && (e.metaKey||e.ctrlKey)) run(); }}
            placeholder="Ex.: criar um programa de busca ativa para reduzir a evasão escolar" rows={3}
            style={{ width:"100%", border:"none", outline:"none", resize:"vertical", marginTop:8, fontSize:16, lineHeight:1.5, color:C.ink, background:"transparent" }} />
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginTop:10, flexWrap:"wrap", gap:10 }}>
            <span style={{ fontSize:12, color:"#8a8576" }}>⌘/Ctrl + Enter para enviar</span>
            <button className="ebr-btn" onClick={()=>run()} disabled={loading || !q.trim()}
              style={{ background:(loading||!q.trim())?"#9bb0bb":C.navy, color:"#fff", border:"none", borderRadius:9, padding:"11px 22px", fontSize:14.5, fontWeight:700 }}>
              {loading ? "Processando…" : "Levantar elementos"}
            </button>
          </div>
        </div>
        {!res && !loading && (
          <div className="no-print" style={{ marginTop:16 }}>
            <div className="ebr-mono" style={{ fontSize:10, color:"#8a8576", marginBottom:9 }}>Experimente</div>
            <div style={{ display:"flex", flexWrap:"wrap", gap:8 }}>
              {EXEMPLOS.map(ex=>(<button key={ex} className="ebr-chip ebr-btn" onClick={()=>run(ex)} style={{ background:"#fff", border:"1px solid #e4ded2", borderRadius:999, padding:"7px 14px", fontSize:13, color:"#5a5648" }}>{ex}</button>))}
            </div>
          </div>
        )}
        {loading && (<div className="no-print" style={{ marginTop:22, color:C.navy, display:"flex", alignItems:"center", gap:10 }}><span className="ebr-dot" style={{ width:8, height:8, borderRadius:"50%", background:C.blue }} /><span style={{ fontSize:14.5 }}>Levantando causas e elementos da cadeia…</span></div>)}
        {err && (<div style={{ marginTop:22, padding:14, background:"#fbeae4", border:`1px solid ${C.rust}`, borderRadius:10, color:C.rust, fontSize:13.5 }}>{err}</div>)}
        {res && (<div className="ebr-rise" style={{ marginTop:26 }}>
          <div className="no-print" style={{ display:"flex", justifyContent:"flex-end", marginBottom:14 }}>
            <button className="ebr-btn" onClick={()=>window.print()} style={{ background:"transparent", border:`1px solid ${C.navy}`, color:C.navy, borderRadius:8, padding:"7px 14px", fontSize:13, fontWeight:600, fontFamily:"'DM Sans',sans-serif", cursor:"pointer" }}>Imprimir / PDF</button>
          </div>
          {renderResult(res)}
        </div>)}
      </main>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
